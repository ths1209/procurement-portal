name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_TEABLE_API_BASE:          ${{ secrets.VITE_TEABLE_API_BASE }}
          VITE_TEABLE_TOKEN:             ${{ secrets.VITE_TEABLE_TOKEN }}
          VITE_TEABLE_USERS_TABLE_ID:    ${{ secrets.VITE_TEABLE_USERS_TABLE_ID }}
          VITE_TEABLE_PROJECTS_TABLE_ID: ${{ secrets.VITE_TEABLE_PROJECTS_TABLE_ID }}
          VITE_TEABLE_TOOLS_TABLE_ID:    ${{ secrets.VITE_TEABLE_TOOLS_TABLE_ID }}
          VITE_SHUHUAN_WEBHOOK:          ${{ secrets.VITE_SHUHUAN_WEBHOOK }}
          VITE_AI_API_KEY:               ${{ secrets.VITE_AI_API_KEY }}
          VITE_AI_API_BASE:              ${{ secrets.VITE_AI_API_BASE }}
          VITE_AI_MODEL:                 ${{ secrets.VITE_AI_MODEL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
